<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rank System Save - xKeyy Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="rankBox" class="box">
        <div id="icon">🛖</div>
        <h3 id="rank">Bronze 1</h3>

        <input id="kill" type="number" placeholder="Kill">
        <input id="death" type="number" placeholder="Death">
        <input id="assist" type="number" placeholder="Assist">

        <div class="button-group">
            <button class="win" onclick="win()">WIN</button>
            <button class="lose" onclick="lose()">LOSE</button>
        </div>

        <div class="progress">
            <div id="bar" class="bar"></div>
        </div>
        <p id="rrText">0 / 100 RR</p>
        <p id="result"></p>
    </div>

    <div class="box">
        <h3>🌍 Top Global</h3>
        <div id="board"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
